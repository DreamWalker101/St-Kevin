<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>St Kevin's Primary School, Hampton Park</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Inter:wght@400;500&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'deep-navy':    '#051E42',
            'burgundy-red': '#8A2232',
            'warm-cream':   '#FBF9F7',
            'cloud-grey':   '#F4F6F8',
            'border-mist':  '#E2E6EA',
            'slate-text':   '#6B7280',
            'navy-tint':    '#0A2D5C',
            'red-soft':     '#F4E3E6',
          },
          fontFamily: {
            'montserrat': ['Montserrat', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            'inter':      ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            'script':     ['Dancing Script', 'cursive'],
          },
          maxWidth: { 'content': '1200px' },
          borderRadius: { 'card': '12px', 'image': '16px' },
          boxShadow: { 'soft': '0 8px 24px rgba(0, 0, 0, 0.08)' },
        }
      }
    }
  </script>

  <style>
    /* ── CSS Custom Properties ── */
    :root {
      --color-deep-navy:    #051E42;
      --color-burgundy-red: #8A2232;
      --color-pure-white:   #FFFFFF;
      --color-warm-cream:   #FBF9F7;
      --color-cloud-grey:   #F4F6F8;
      --color-border-mist:  #E2E6EA;
      --color-slate-text:   #6B7280;
      --color-navy-tint:    #0A2D5C;
      --color-red-soft:     #F4E3E6;

      --font-montserrat:     'Montserrat', ui-sans-serif, system-ui, sans-serif;
      --font-inter:          'Inter', ui-sans-serif, system-ui, sans-serif;
      --font-dancing-script: 'Dancing Script', cursive;

      --text-caption:    14px; --leading-caption:    1.6;
      --text-body:       16px; --leading-body:       1.7;
      --text-body-lg:    18px; --leading-body-lg:    1.7;
      --text-tagline:    24px; --leading-tagline:    1.4;
      --text-tagline-lg: 28px; --leading-tagline-lg: 1.4;
      --text-heading-sm: 22px; --leading-heading-sm: 1.3;
      --text-heading:    28px; --leading-heading:    1.25;
      --text-heading-lg: 36px; --leading-heading-lg: 1.2;
      --text-display:    48px; --leading-display:    1.1;
      --text-display-lg: 56px; --leading-display-lg: 1.1;

      --font-weight-regular:   400;
      --font-weight-medium:    500;
      --font-weight-semibold:  600;
      --font-weight-bold:      700;
      --font-weight-extrabold: 800;

      --spacing-4:   4px;  --spacing-8:   8px;  --spacing-12:  12px;
      --spacing-16:  16px; --spacing-24:  24px; --spacing-32:  32px;
      --spacing-48:  48px; --spacing-64:  64px; --spacing-80:  80px;
      --spacing-96:  96px; --spacing-120: 120px;

      --max-width:               1200px;
      --section-padding-desktop: 96px;
      --section-padding-tablet:  64px;
      --section-padding-mobile:  48px;

      --radius-buttons:  8px;
      --radius-cards:    12px;
      --radius-inputs:   8px;
      --radius-images:   16px;
      --radius-circular: 50%;
      --radius-pill:     999px;

      --shadow-soft: 0 8px 24px rgba(0,0,0,0.08);

      --transition-fast:   0.2s ease;
      --transition-medium: 0.3s ease;

      --z-nav-overlay:   9999;
      --z-sticky-header: 1000;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: var(--font-inter);
      color: var(--color-deep-navy);
      background: var(--color-pure-white);
    }

    /* ── Header ── */
    .sk-header {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: var(--z-sticky-header);
      padding: 20px 24px;
      display: flex; align-items: center; justify-content: space-between;
      transition: background var(--transition-medium), box-shadow var(--transition-medium);
    }
    .sk-header.is-transparent { background: transparent; }
    .sk-header.is-scrolled {
      background: var(--color-pure-white);
      box-shadow: 0 1px 0 var(--color-border-mist);
    }

    /* Hamburger */
    .sk-hamburger {
      display: flex; flex-direction: column; justify-content: center; gap: 5px;
      width: 40px; height: 40px;
      background: none; border: none; cursor: pointer; padding: 4px; flex-shrink: 0;
    }
    .sk-hamburger span {
      display: block; height: 2px; border-radius: 2px;
      transition: background var(--transition-medium);
    }
    .is-transparent .sk-hamburger span { background: var(--color-pure-white); }
    .is-scrolled    .sk-hamburger span { background: var(--color-deep-navy); }

    /* Centre logo */
    .sk-header-logo {
      position: absolute; left: 50%; transform: translateX(-50%);
    }
    .sk-logo-placeholder {
      height: 48px; display: flex; align-items: center; gap: 8px;
    }
    .sk-logo-mark {
      width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-montserrat); font-weight: var(--font-weight-bold); font-size: 15px;
      transition: background var(--transition-medium), color var(--transition-medium), border-color var(--transition-medium);
      border: 2px solid transparent;
    }
    .is-transparent .sk-logo-mark { background: rgba(255,255,255,0.15); color: #fff; border-color: rgba(255,255,255,0.4); }
    .is-scrolled    .sk-logo-mark { background: var(--color-deep-navy); color: #fff; }

    .sk-logo-text {
      font-family: var(--font-montserrat); font-weight: var(--font-weight-bold);
      font-size: 12px; line-height: 1.25; text-transform: uppercase; letter-spacing: 0.05em;
      transition: color var(--transition-medium);
    }
    .is-transparent .sk-logo-text { color: var(--color-pure-white); }
    .is-scrolled    .sk-logo-text { color: var(--color-deep-navy); }

    /* Search */
    .sk-search-btn {
      width: 40px; height: 40px;
      background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; transition: background var(--transition-fast); flex-shrink: 0;
    }
    .sk-search-btn:hover { background: rgba(255,255,255,0.12); }
    .is-scrolled .sk-search-btn:hover { background: var(--color-cloud-grey); }
    .sk-search-btn svg { transition: stroke var(--transition-medium); }
    .is-transparent .sk-search-btn svg { stroke: var(--color-pure-white); }
    .is-scrolled    .sk-search-btn svg { stroke: var(--color-deep-navy); }

    /* ── Nav Overlay ── */
    .sk-nav-overlay {
      position: fixed; inset: 0; background: var(--color-deep-navy);
      z-index: var(--z-nav-overlay);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none;
      transition: opacity var(--transition-medium);
    }
    .sk-nav-overlay.is-open { opacity: 1; pointer-events: all; }

    .sk-nav-overlay nav { display: flex; flex-direction: column; align-items: center; gap: 32px; }

    .sk-nav-overlay nav a {
      font-family: var(--font-montserrat); font-weight: var(--font-weight-bold);
      font-size: clamp(28px, 5vw, 40px);
      color: var(--color-pure-white); text-decoration: none;
      letter-spacing: -0.01em; position: relative;
      transition: color var(--transition-fast);
    }
    .sk-nav-overlay nav a::after {
      content: ''; position: absolute; bottom: -4px; left: 0;
      width: 0; height: 2px; background: var(--color-burgundy-red);
      transition: width var(--transition-medium);
    }
    .sk-nav-overlay nav a:hover { color: rgba(255,255,255,0.75); }
    .sk-nav-overlay nav a:hover::after { width: 100%; }

    .sk-nav-close {
      position: absolute; top: 24px; right: 24px;
      width: 44px; height: 44px; background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--color-pure-white); font-size: 32px; line-height: 1;
      border-radius: 50%; transition: background var(--transition-fast);
    }
    .sk-nav-close:hover { background: rgba(255,255,255,0.1); }

    .sk-nav-footer {
      position: absolute; bottom: 40px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 40px; flex-wrap: wrap; padding: 0 24px;
    }
    .sk-nav-footer a {
      font-family: var(--font-inter); font-size: var(--text-caption);
      color: rgba(255,255,255,0.45); text-decoration: none;
      transition: color var(--transition-fast);
    }
    .sk-nav-footer a:hover { color: rgba(255,255,255,0.85); }

    @media (max-width: 640px) {
      .sk-nav-footer { flex-direction: column; align-items: center; gap: 12px; bottom: 32px; }
    }

    /* ── DEV placeholder — remove when hero is built ── */
    .dev-hero-placeholder {
      height: 100vh;
      background: var(--color-deep-navy);
      display: flex; align-items: center; justify-content: center;
      color: rgba(255,255,255,0.3);
      font-family: var(--font-inter); font-size: 13px;
      letter-spacing: 0.08em; text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- ════════════════════════════════════════
       HEADER
  ════════════════════════════════════════ -->
  <header class="sk-header is-transparent" id="sk-header">

    <!-- Left: Hamburger -->
    <button class="sk-hamburger" id="sk-hamburger-btn" aria-label="Open navigation" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- Centre: St Kevin's Logo -->
    <div class="sk-header-logo">
      <!--
        When logos are available, replace placeholder with:
        <img src="images/logo-sk-white.svg"  alt="St Kevin's Primary School" style="height:48px" class="sk-logo-white">
        <img src="images/logo-sk-colour.svg" alt="St Kevin's Primary School" style="height:48px" class="sk-logo-colour">
        (toggle visibility based on is-transparent / is-scrolled on header)
      -->
      <div class="sk-logo-placeholder">
        <div class="sk-logo-mark">SK</div>
        <div class="sk-logo-text">St Kevin's<br>Hampton Park</div>
      </div>
    </div>

    <!-- Right: Search -->
    <button class="sk-search-btn" aria-label="Search site">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9.5" cy="9.5" r="7"/>
        <line x1="14.5" y1="14.5" x2="21" y2="21"/>
      </svg>
    </button>

  </header>

  <!-- ════════════════════════════════════════
       FULLSCREEN NAV OVERLAY
  ════════════════════════════════════════ -->
  <div class="sk-nav-overlay" id="sk-nav-overlay" role="dialog" aria-modal="true" aria-label="Site navigation">

    <button class="sk-nav-close" id="sk-nav-close-btn" aria-label="Close navigation">&times;</button>

    <nav>
      <a href="about.html">About Us</a>
      <a href="learning.html">Learning</a>
      <a href="community.html">Community</a>
      <a href="enrolments.html">Enrolments</a>
      <a href="contact.html">Contact</a>
    </nav>

    <div class="sk-nav-footer">
      <a href="tel:0397098600">(03) 9709 8600</a>
      <a href="mailto:administration@skhamptonpark.catholic.edu.au">administration@skhamptonpark.catholic.edu.au</a>
    </div>

  </div>

  <!-- ════════════════════════════════════════
       HERO — placeholder until section is built
  ════════════════════════════════════════ -->
  <div class="dev-hero-placeholder">
    Hero section — coming next
  </div>

  <!-- ════════════════════════════════════════
       HEADER + NAV JAVASCRIPT
  ════════════════════════════════════════ -->
  <script>
    (function () {
      const header  = document.getElementById('sk-header');
      const overlay = document.getElementById('sk-nav-overlay');
      const openBtn = document.getElementById('sk-hamburger-btn');
      const closeBtn= document.getElementById('sk-nav-close-btn');

      /* Transparent → white on scroll */
      function onScroll() {
        var scrolled = window.scrollY > 60;
        header.classList.toggle('is-scrolled',    scrolled);
        header.classList.toggle('is-transparent', !scrolled);
      }
      window.addEventListener('scroll', onScroll, { passive: true });
      onScroll();

      /* Open overlay */
      openBtn.addEventListener('click', function () {
        overlay.classList.add('is-open');
        openBtn.setAttribute('aria-expanded', 'true');
        document.body.style.overflow = 'hidden';
      });

      /* Close overlay */
      function closeNav() {
        overlay.classList.remove('is-open');
        openBtn.setAttribute('aria-expanded', 'false');
        document.body.style.overflow = '';
      }

      closeBtn.addEventListener('click', closeNav);
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape' && overlay.classList.contains('is-open')) closeNav();
      });
      overlay.querySelectorAll('nav a').forEach(function (a) {
        a.addEventListener('click', closeNav);
      });
    })();
  </script>

</body>
</html>
