<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>St Kevin's Primary School, Hampton Park</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Inter:wght@400;500&family=Montserrat:wght@600;700;800&display=swap" rel="stylesheet">

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'deep-navy':    '#051E42',
            'burgundy-red': '#8A2232',
            'warm-cream':   '#FBF9F7',
            'cloud-grey':   '#F4F6F8',
            'border-mist':  '#E2E6EA',
            'slate-text':   '#6B7280',
            'navy-tint':    '#0A2D5C',
            'red-soft':     '#F4E3E6',
          },
          fontFamily: {
            'montserrat': ['Montserrat', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            'inter':      ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
            'script':     ['Dancing Script', 'cursive'],
          },
          maxWidth: { 'content': '1200px' },
          borderRadius: { 'card': '12px', 'image': '16px' },
          boxShadow: { 'soft': '0 8px 24px rgba(0, 0, 0, 0.08)' },
        }
      }
    }
  </script>

  <!-- GSAP -->
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>


  <style>
    /* ── CSS Custom Properties ── */
    :root {
      --color-deep-navy:    #051E42;
      --color-burgundy-red: #8A2232;
      --color-pure-white:   #FFFFFF;
      --color-warm-cream:   #FBF9F7;
      --color-cloud-grey:   #F4F6F8;
      --color-border-mist:  #E2E6EA;
      --color-slate-text:   #6B7280;
      --color-navy-tint:    #0A2D5C;
      --color-red-soft:     #F4E3E6;

      --font-montserrat:     'Montserrat', ui-sans-serif, system-ui, sans-serif;
      --font-inter:          'Inter', ui-sans-serif, system-ui, sans-serif;
      --font-dancing-script: 'Dancing Script', cursive;

      --text-caption:    14px; --leading-caption:    1.6;
      --text-body:       16px; --leading-body:       1.7;
      --text-body-lg:    18px; --leading-body-lg:    1.7;
      --text-tagline:    24px; --leading-tagline:    1.4;
      --text-heading-sm: 22px; --leading-heading-sm: 1.3;
      --text-heading:    28px; --leading-heading:    1.25;
      --text-heading-lg: 36px; --leading-heading-lg: 1.2;
      --text-display:    48px; --leading-display:    1.1;
      --text-display-lg: 56px; --leading-display-lg: 1.1;

      --font-weight-regular:   400;
      --font-weight-medium:    500;
      --font-weight-semibold:  600;
      --font-weight-bold:      700;
      --font-weight-extrabold: 800;

      --spacing-4:   4px;  --spacing-8:   8px;  --spacing-12: 12px;
      --spacing-16: 16px;  --spacing-24: 24px;  --spacing-32: 32px;
      --spacing-48: 48px;  --spacing-64: 64px;  --spacing-80: 80px;

      --max-width:               1200px;
      --section-padding-desktop: 96px;
      --section-padding-tablet:  64px;
      --section-padding-mobile:  48px;

      --radius-buttons:  8px;
      --radius-cards:    12px;
      --radius-inputs:   8px;
      --radius-images:   16px;
      --radius-circular: 50%;
      --radius-pill:     999px;

      --shadow-soft: 0 8px 24px rgba(0,0,0,0.08);

      --transition-fast:   0.2s ease;
      --transition-medium: 0.3s ease;

      --z-search:      1100;
      --z-header:      1000;
      --z-backdrop:    9000;
      --z-sidebar:     9100;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: var(--font-inter);
      color: var(--color-deep-navy);
      background: var(--color-pure-white);
    }

    /* ── Header ── */
    .sk-header {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: var(--z-header);
      padding: 20px 24px;
      display: flex; align-items: center; justify-content: space-between;
      transition: background var(--transition-medium), box-shadow var(--transition-medium), transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .sk-header.is-transparent { background: transparent; }
    .sk-header.is-scrolled {
      background: var(--color-pure-white);
      box-shadow: 0 1px 0 var(--color-border-mist);
    }
    .sk-header.is-hidden { transform: translateY(-100%); }

    /* Hamburger */
    .sk-hamburger {
      display: flex; flex-direction: column; justify-content: center; gap: 5px;
      width: 40px; height: 40px;
      background: none; border: none; cursor: pointer; padding: 6px; flex-shrink: 0;
      border-radius: 8px;
      transition: background var(--transition-fast);
    }
    .sk-hamburger:hover { background: rgba(255,255,255,0.12); }
    .is-scrolled .sk-hamburger:hover { background: var(--color-cloud-grey); }
    .sk-hamburger span {
      display: block; height: 2px; border-radius: 2px;
      transition: background var(--transition-medium);
    }
    .is-transparent .sk-hamburger span { background: var(--color-pure-white); }
    .is-scrolled    .sk-hamburger span { background: var(--color-deep-navy); }

    /* Centre logo — white version sits on top by default, colour fades in on scroll */
    .sk-header-logo {
      position: absolute;
      left: 50%; top: 16px;
      transform: translateX(-50%);
      transform-origin: top center;
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .is-scrolled .sk-header-logo {
      transform: translateX(-50%) scale(0.7);
    }
    .sk-logo-img {
      display: block;
      height: var(--logo-sk-size, 120px); width: auto;
      transition: opacity var(--transition-medium);
    }
    .sk-logo-colour {
      position: absolute; top: 0; left: 0;
      opacity: 0;
    }
    .sk-logo-white  { opacity: 1; }
    .is-scrolled .sk-logo-white  { opacity: 0; }
    .is-scrolled .sk-logo-colour { opacity: 1; }

    .sk-sidebar-logo { transition: none; }

    /* Manual white logo toggle (debug) */
    .logos-white .sk-logo-colour { opacity: 0 !important; }
    .logos-white .sk-logo-white  { opacity: 1 !important; }

    /* Search toggle */
    .sk-search-btn {
      width: 40px; height: 40px;
      background: none; border: none; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      transition: background var(--transition-fast);
      flex-shrink: 0;
    }
    .sk-search-btn:hover { background: rgba(255,255,255,0.12); }
    .is-scrolled .sk-search-btn:hover { background: var(--color-cloud-grey); }
    .sk-search-btn svg { transition: stroke var(--transition-medium); }
    .is-transparent .sk-search-btn svg { stroke: var(--color-pure-white); }
    .is-scrolled    .sk-search-btn svg { stroke: var(--color-deep-navy); }

    /* ── Search Panel ── */
    .sk-search-panel {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: var(--z-search);
      background: var(--color-pure-white);
      border-bottom: 1px solid var(--color-border-mist);
      padding: 20px 24px;
      visibility: hidden; opacity: 0;
      /* GSAP controls visibility/opacity — do not set display:none */
    }
    .sk-search-inner {
      max-width: var(--max-width); margin: 0 auto;
      display: flex; align-items: center; gap: 12px;
    }
    .sk-search-form {
      flex: 1; display: flex; align-items: center; gap: 0;
      border: 1.5px solid var(--color-border-mist);
      border-radius: 10px;
      overflow: hidden;
      background: var(--color-cloud-grey);
      transition: border-color var(--transition-fast), box-shadow var(--transition-fast);
    }
    .sk-search-form:focus-within {
      border-color: var(--color-deep-navy);
      box-shadow: 0 0 0 3px rgba(5, 30, 66, 0.08);
      background: #fff;
    }
    .sk-search-icon {
      padding: 0 14px 0 16px; display: flex; align-items: center; flex-shrink: 0;
    }
    .sk-search-icon svg { display: block; }
    .sk-search-input {
      flex: 1; border: none; background: transparent; outline: none;
      font-family: var(--font-inter); font-size: 16px; font-weight: 400;
      color: var(--color-deep-navy); padding: 14px 0;
      line-height: 1.4;
    }
    .sk-search-input::placeholder { color: var(--color-slate-text); }
    .sk-search-submit {
      padding: 10px 16px; margin: 4px;
      background: var(--color-deep-navy); border: none; cursor: pointer;
      border-radius: 7px;
      font-family: var(--font-montserrat); font-size: 13px; font-weight: 700;
      color: #fff; letter-spacing: 0.03em;
      transition: background var(--transition-fast);
    }
    .sk-search-submit:hover { background: var(--color-navy-tint); }
    .sk-search-close-btn {
      width: 40px; height: 40px; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer;
      border-radius: 50%;
      transition: background var(--transition-fast);
    }
    .sk-search-close-btn:hover { background: var(--color-cloud-grey); }
    .sk-search-results {
      max-width: var(--max-width); margin: 12px auto 0;
      font-family: var(--font-inter); font-size: 14px;
      color: var(--color-slate-text); min-height: 0;
    }
    .sk-search-results.has-message {
      padding: 8px 0 4px;
      border-top: 1px solid var(--color-border-mist);
    }

    /* ── Nav Backdrop ── */
    .sk-nav-backdrop {
      position: fixed; inset: 0;
      background: rgba(5, 30, 66, 0.6);
      z-index: var(--z-backdrop);
      cursor: pointer;
      visibility: hidden; opacity: 0;
      /* GSAP drives visibility + opacity */
    }

    /* ── Nav Sidebar ── */
    .sk-nav-sidebar {
      position: fixed; top: 0; left: 0; bottom: 0;
      width: min(620px, 95vw);
      z-index: var(--z-sidebar);
      background: #fff;
      display: flex; flex-direction: row;
      overflow: hidden;
      box-shadow: 4px 0 40px rgba(5, 30, 66, 0.18);
      transform: translateX(-100%);
    }

    /* Left scrollable content */
    .sk-sidebar-content {
      width: min(340px, 100%);
      flex-shrink: 0;
      display: flex; flex-direction: column;
      overflow-y: auto; overflow-x: hidden;
      scrollbar-width: none;
    }
    .sk-sidebar-content::-webkit-scrollbar { display: none; }

    /* Right tall image panel — floats with padding so corners are visible */
    .sk-sidebar-image {
      flex: 1; min-width: 160px;
      padding: 12px 12px 12px 0;
      display: flex;
    }
    /* Frame provides the rounded corners + clips the GSAP scale */
    .sk-sidebar-image-frame {
      flex: 1;
      border-radius: 18px;
      overflow: hidden;
      position: relative;
    }
    .sk-sidebar-image img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; object-position: center top;
      display: block;
      will-change: transform;
    }

    @media (max-width: 600px) {
      .sk-sidebar-image { display: none; }
      .sk-nav-sidebar   { width: min(340px, 90vw); }
    }

    /* Logo in sidebar */
    .sk-sidebar-logo {
      max-height: var(--logo-sidebar-size, 80px);
      max-width: 100%;
      width: auto; height: auto; display: block;
    }

    /* Sidebar header row */
    .sk-sidebar-header {
      display: flex; align-items: center; gap: 16px;
      padding: 20px 24px 0;
      flex-shrink: 0;
    }

    /* Close button — square with rounded corners, bordered */
    .sk-sidebar-close {
      width: 40px; height: 40px; flex-shrink: 0;
      background: none;
      border: 1.5px solid var(--color-border-mist);
      border-radius: 10px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      color: var(--color-deep-navy);
      transition: border-color var(--transition-fast), background var(--transition-fast);
    }
    .sk-sidebar-close:hover {
      border-color: var(--color-deep-navy);
      background: var(--color-cloud-grey);
    }

    /* Primary nav */
    .sk-sidebar-nav {
      padding: 32px 24px 0;
      display: flex; flex-direction: column; gap: 4px;
      flex-shrink: 0;
    }

    .sk-nav-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 0;
      text-decoration: none;
      cursor: pointer;
      border-radius: 8px;
      transition: none; /* GSAP handles hover */
    }

    .sk-nav-item-label {
      font-family: var(--font-montserrat);
      font-size: clamp(22px, 4vw, 28px);
      font-weight: var(--font-weight-bold);
      color: var(--color-deep-navy);
      letter-spacing: -0.01em;
      line-height: 1.15;
      display: inline-block;
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1), color 0.28s;
    }
    .sk-nav-item:hover .sk-nav-item-label { transform: translateX(6px); }

    /* Arrow — bare, no circle. Grows toward the right on hover. */
    .sk-nav-arrow {
      display: flex; align-items: center;
      color: var(--color-burgundy-red);
      flex-shrink: 0;
    }
.sk-nav-arrow-line {
      display: block; height: 2px; width: 0;
      background: currentColor;
      transition: width 0.28s cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: left center;
      border-radius: 2px;
    }
    .sk-nav-arrow-chevron {
      display: flex; align-items: center;
      transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .sk-nav-item:hover .sk-nav-arrow-line   { width: 20px; }
    .sk-nav-item:hover .sk-nav-arrow-chevron { transform: translateX(4px); }
    .sk-nav-item:hover .sk-nav-item-label   { color: var(--color-burgundy-red); }


    /* Sidebar footer — icon island */
    .sk-sidebar-footer {
      margin-top: auto;
      padding: 20px 24px 28px;
      border-top: 1px solid var(--color-border-mist);
    }
    /* The island: pill-shaped container grouping all icons */
    .sk-sidebar-socials {
      display: inline-flex; align-items: center;
      background: var(--color-cloud-grey);
      border-radius: 999px;
      padding: 5px;
      gap: 2px;
    }
    .sk-social-btn {
      width: 38px; height: 38px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      background: transparent;
      color: #4B5563;
      text-decoration: none;
    }
    .sk-social-btn svg { display: block; overflow: visible; }

    /* ── Hero ── */
    .sk-hero {
      position: relative;
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
      background: var(--color-deep-navy);
    }

    /* YouTube iframe — covers like background-size: cover */
    .sk-hero-video-wrap {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .sk-hero-video-wrap iframe {
      position: absolute;
      top: 50%; left: 50%;
      /* Ensure 16:9 iframe always covers the container */
      width: max(100%, calc(100vh * 16 / 9));
      height: max(100%, calc(100vw * 9 / 16));
      min-width: 100%; min-height: 100%;
      transform: translate(-50%, -50%);
      border: 0;
      pointer-events: none;
    }

    /* Navy overlay — opacity controlled by CSS var for the debug panel */
    .sk-hero-overlay {
      position: absolute;
      inset: 0;
      background: var(--color-deep-navy);
      opacity: var(--hero-overlay-opacity, 0.60);
      pointer-events: none;
      transition: opacity 0.15s ease;
    }

    /* MACS logo bottom-left (per client revision doc) */
    .sk-hero-macs {
      position: absolute;
      bottom: 32px; left: 32px;
      z-index: 2;
    }
    .sk-hero-macs-placeholder {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 8px 14px;
      font-family: var(--font-montserrat); font-size: 11px;
      font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase;
      color: rgba(255,255,255,0.6);
    }

    /* ── Debug panel (dev only) ── */
    .sk-debug-panel {
      position: fixed;
      bottom: 24px; right: 24px;
      z-index: 9999;
      background: rgba(5, 30, 66, 0.92);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 16px 18px;
      min-width: 220px;
      color: #fff;
      font-family: var(--font-inter);
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    .sk-debug-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .sk-debug-panel-title {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(255,255,255,0.5);
    }
    .sk-debug-toggle {
      background: none; border: none; cursor: pointer;
      color: rgba(255,255,255,0.4); padding: 0;
      font-size: 16px; line-height: 1;
      transition: color 0.15s;
    }
    .sk-debug-toggle:hover { color: rgba(255,255,255,0.8); }
    .sk-debug-row {
      display: flex; align-items: center; justify-content: space-between;
      gap: 10px; margin-bottom: 10px;
    }
    .sk-debug-label {
      font-size: 12px; font-weight: 500;
      color: rgba(255,255,255,0.7); white-space: nowrap;
    }
    .sk-debug-value {
      font-size: 12px; font-weight: 700;
      color: #fff; min-width: 32px; text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .sk-debug-slider {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 4px;
      background: rgba(255,255,255,0.15);
      border-radius: 2px; outline: none;
      margin-bottom: 0;
    }
    .sk-debug-slider::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--color-burgundy-red);
      cursor: pointer;
      border: 2px solid #fff;
    }
    .sk-debug-slider::-moz-range-thumb {
      width: 14px; height: 14px;
      border-radius: 50%;
      background: var(--color-burgundy-red);
      cursor: pointer;
      border: 2px solid #fff;
    }
    .sk-debug-panel.is-collapsed .sk-debug-body { display: none; }
    .sk-debug-panel.is-collapsed { padding-bottom: 14px; }

    /* ── Reduced motion ── */
    @media (prefers-reduced-motion: reduce) {
      .sk-nav-sidebar, .sk-nav-backdrop, .sk-search-panel {
        transition: visibility 0s, opacity 0.1s !important;
      }
    }
  </style>
</head>
<body>

  <!-- ════════════════════════════════
       HEADER
  ════════════════════════════════ -->
  <header class="sk-header is-transparent" id="sk-header">

    <!-- Left: Hamburger -->
    <button class="sk-hamburger" id="sk-hamburger-btn" aria-label="Open navigation" aria-expanded="false">
      <span></span>
      <span></span>
      <span></span>
    </button>

    <!-- Centre: Logo (white over hero, colour when scrolled) -->
    <div class="sk-header-logo">
      <img src="images/logo-sk-white.png"  alt="St Kevin's Primary School, Hampton Park" class="sk-logo-img sk-logo-white">
      <img src="images/logo-sk-colour.png" alt=""                                          class="sk-logo-img sk-logo-colour" aria-hidden="true">
    </div>

    <!-- Right: Search -->
    <button class="sk-search-btn" id="sk-search-btn" aria-label="Search site" aria-expanded="false">
      <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9.5" cy="9.5" r="7"/>
        <line x1="14.5" y1="14.5" x2="21" y2="21"/>
      </svg>
    </button>

  </header>


  <!-- ════════════════════════════════
       SEARCH PANEL
  ════════════════════════════════ -->
  <div class="sk-search-panel" id="sk-search-panel" role="search" aria-label="Site search">
    <div class="sk-search-inner">
      <form class="sk-search-form" id="sk-search-form" autocomplete="off">
        <span class="sk-search-icon" aria-hidden="true">
          <svg width="18" height="18" viewBox="0 0 22 22" fill="none" stroke="#6B7280" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9.5" cy="9.5" r="7"/>
            <line x1="14.5" y1="14.5" x2="21" y2="21"/>
          </svg>
        </span>
        <input
          type="search"
          class="sk-search-input"
          id="sk-search-input"
          placeholder="Search St Kevin's…"
          aria-label="Search"
        >
        <button type="submit" class="sk-search-submit">Search</button>
      </form>
      <button class="sk-search-close-btn" id="sk-search-close-btn" aria-label="Close search">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="#374151" stroke-width="2" stroke-linecap="round">
          <line x1="2" y1="2" x2="16" y2="16"/><line x1="16" y1="2" x2="2" y2="16"/>
        </svg>
      </button>
    </div>
    <div class="sk-search-results" id="sk-search-results" aria-live="polite"></div>
  </div>


  <!-- ════════════════════════════════
       NAV BACKDROP
  ════════════════════════════════ -->
  <div class="sk-nav-backdrop" id="sk-nav-backdrop"></div>


  <!-- ════════════════════════════════
       NAV SIDEBAR
  ════════════════════════════════ -->
  <aside class="sk-nav-sidebar" id="sk-nav-sidebar" role="dialog" aria-modal="true" aria-label="Site navigation">

    <!-- Left: scrollable nav content -->
    <div class="sk-sidebar-content">

      <!-- Header row: close + logo -->
      <div class="sk-sidebar-header">
        <button class="sk-sidebar-close" id="sk-sidebar-close" aria-label="Close navigation">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <line x1="2" y1="2" x2="14" y2="14"/>
            <line x1="14" y1="2" x2="2" y2="14"/>

  <!-- ════════════════════════════════
       SCRIPTS
  ════════════════════════════════ -->
  <script>
  (function () {

    /* ── Elements ── */
    var header      = document.getElementById('sk-header');
    var hamburger   = document.getElementById('sk-hamburger-btn');
    var sidebar     = document.getElementById('sk-nav-sidebar');
    var backdrop    = document.getElementById('sk-nav-backdrop');
    var closeBtn    = document.getElementById('sk-sidebar-close');
    var searchBtn   = document.getElementById('sk-search-btn');
    var searchPanel = document.getElementById('sk-search-panel');
    var searchClose = document.getElementById('sk-search-close-btn');
    var searchInput = document.getElementById('sk-search-input');
    var searchForm  = document.getElementById('sk-search-form');
    var searchRes   = document.getElementById('sk-search-results');

    var navItems    = sidebar.querySelectorAll('.sk-nav-item');
    var secLinks    = sidebar.querySelectorAll('.sk-secondary-link');
    var footerLinks = sidebar.querySelectorAll('.sk-social-btn');
    var sideHead    = sidebar.querySelector('.sk-sidebar-header');
    var sideImg     = sidebar.querySelector('.sk-sidebar-image img');

    var navOpen = false;
    var searchOpen = false;
    var lastScrollY = 0;
    var HIDE_AFTER = 140; // px from top before hide-on-scroll kicks in

    /* ── Set initial GSAP states ── */
    gsap.set(sidebar,     { x: '-100%' });
    gsap.set(backdrop,    { autoAlpha: 0 });
    gsap.set(searchPanel, { autoAlpha: 0, y: -8 });

    /* ── Scroll: transparent → white + hide on scroll down / show on scroll up ── */
    function onScroll() {
      var y = window.scrollY;
      var scrolled = y > 60;
      header.classList.toggle('is-scrolled',    scrolled);
      header.classList.toggle('is-transparent', !scrolled);

      if (y > HIDE_AFTER) {
        header.classList.toggle('is-hidden', y > lastScrollY);
      } else {
        header.classList.remove('is-hidden');
      }
      lastScrollY = y;
    }
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();

    /* ── Open sidebar ── */
    function openNav() {
      navOpen = true;
      hamburger.setAttribute('aria-expanded', 'true');
      document.body.style.overflow = 'hidden';

      var rm = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      var tl = gsap.timeline({ defaults: { ease: 'expo.out' } });

      /* Backdrop — slow luxurious fade so panel feels like it's emerging */
      tl.to(backdrop, { autoAlpha: 1, duration: rm ? 0.01 : 0.65 }, 0);

      /* Panel — the hero move: long deceleration makes it feel weighty */
      tl.to(sidebar, { x: '0%', duration: rm ? 0.01 : 0.78 }, 0);

      /* Photo panel — zooms out slowly, gives depth as panel arrives */
      if (sideImg && !rm) {
        tl.from(sideImg, {
          scale: 1.1, duration: 1.1, ease: 'power3.out', clearProps: 'transform'
        }, 0);
      }

      /* Header row — waits for panel to be 50% in before appearing */
      tl.from(sideHead, {
        autoAlpha: 0, y: 8,
        duration: rm ? 0 : 0.45, clearProps: 'all'
      }, rm ? 0 : 0.32);

      /* Nav items — cascade in with x+y float, unhurried stagger */
      tl.from(navItems, {
        autoAlpha: 0, x: -22, y: 10,
        duration: rm ? 0 : 0.55,
        stagger: rm ? 0 : { each: 0.09 },
        clearProps: 'all'
      }, rm ? 0 : 0.38);

      /* Footer icons — bloom in last, after all items have settled */
      tl.from(footerLinks, {
        autoAlpha: 0, y: 8,
        duration: rm ? 0 : 0.4,
        stagger: rm ? 0 : { each: 0.07 },
        ease: 'power3.out', clearProps: 'all'
      }, rm ? 0 : 0.76);

      tl.call(function () { closeBtn.focus(); });
    }

    /* ── Close sidebar ── */
    function closeNav() {
      navOpen = false;
      hamburger.setAttribute('aria-expanded', 'false');
      document.body.style.overflow = '';

      var rm = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

      var tl = gsap.timeline();

      /* Panel — power4.inOut: builds then decelerates, feels intentional not abrupt */
      tl.to(sidebar,  { x: '-100%', duration: rm ? 0.01 : 0.56, ease: 'power4.inOut' }, 0);

      /* Backdrop lingers a beat behind the panel */
      tl.to(backdrop, { autoAlpha: 0, duration: rm ? 0.01 : 0.42, ease: 'power2.in' }, rm ? 0 : 0.08);
    }

    /* ── Nav triggers ── */
    hamburger.addEventListener('click', openNav);
    closeBtn.addEventListener('click', closeNav);
    backdrop.addEventListener('click', closeNav);

    /* Close when a nav link is clicked */
    navItems.forEach(function(a) { a.addEventListener('click', closeNav); });

    /* Escape key closes sidebar or search */
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') {
        if (navOpen) closeNav();
        if (searchOpen) closeSearch();
      }
    });

    /* Basic focus trap inside sidebar */
    sidebar.addEventListener('keydown', function(e) {
      if (!navOpen || e.key !== 'Tab') return;
      var focusable = Array.from(sidebar.querySelectorAll(
        'button, a, input, [tabindex]:not([tabindex="-1"])'
      )).filter(function(el) { return !el.disabled; });
      if (!focusable.length) return;
      var first = focusable[0];
      var last  = focusable[focusable.length - 1];
      if (e.shiftKey && document.activeElement === first) {
        e.preventDefault(); last.focus();
      } else if (!e.shiftKey && document.activeElement === last) {
        e.preventDefault(); first.focus();
      }
    });


    /* ── Open search ── */
    function openSearch() {
      searchOpen = true;
      searchBtn.setAttribute('aria-expanded', 'true');

      gsap.to(searchPanel, {
        autoAlpha: 1, y: 0, duration: 0.28, ease: 'power2.out'
      });

      /* Small delay so panel is visible before focus */
      requestAnimationFrame(function() { searchInput.focus(); });
    }

    /* ── Close search ── */
    function closeSearch() {
      searchOpen = false;
      searchBtn.setAttribute('aria-expanded', 'false');
      searchInput.value = '';
      searchRes.textContent = '';
      searchRes.classList.remove('has-message');

      gsap.to(searchPanel, {
        autoAlpha: 0, y: -8, duration: 0.22, ease: 'power2.in'
      });
    }

    searchBtn.addEventListener('click', function() {
      if (searchOpen) closeSearch(); else openSearch();
    });
    searchClose.addEventListener('click', closeSearch);


    /* ── Search form ── */
    searchForm.addEventListener('submit', function(e) {
      e.preventDefault();
      var q = searchInput.value.trim();
      if (!q) return;

      searchRes.classList.add('has-message');

      /* Site content will be indexed when pages are built;
         for now, show a friendly holding message. */
      searchRes.innerHTML =
        '<span style="color:#374151">No results found for “' +
        escapeHtml(q) +
        '” — full search will be available once all pages are live.</span>';
    });

    /* Clear results when user starts typing again */
    searchInput.addEventListener('input', function() {
      if (searchRes.classList.contains('has-message')) {
        searchRes.textContent = '';
        searchRes.classList.remove('has-message');
      }
    });

    function escapeHtml(str) {
      return str.replace(/[&<>"']/g, function(c) {
        return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
      });
    }

  })();
  </script>


  <!-- Debug panel controls -->
  <script>
  (function () {
    var root       = document.documentElement;
    var panel      = document.getElementById('sk-debug-panel');
    var toggleBtn  = document.getElementById('sk-debug-toggle-btn');

    if (!panel) return;

    /* ── Collapse / expand ── */
    toggleBtn.addEventListener('click', function () {
      var collapsed = panel.classList.toggle('is-collapsed');
      toggleBtn.textContent = collapsed ? '▸' : '▾';
      toggleBtn.setAttribute('aria-label', collapsed ? 'Expand debug panel' : 'Collapse debug panel');
    });

    /* ── Hero overlay opacity ── */
    var overlaySlider = document.getElementById('sk-debug-overlay-slider');
    var overlayVal    = document.getElementById('sk-debug-overlay-val');
    function setOverlay(v) {
      root.style.setProperty('--hero-overlay-opacity', (v / 100).toFixed(2));
      overlayVal.textContent = v + '%';
    }
    overlaySlider.addEventListener('input', function () { setOverlay(parseInt(this.value, 10)); });
    setOverlay(parseInt(overlaySlider.value, 10));

    /* ── SK logo size ── */
    var skLogoSlider = document.getElementById('sk-debug-sk-logo-slider');
    var skLogoVal    = document.getElementById('sk-debug-sk-logo-val');
    function setSkLogo(v) {
      root.style.setProperty('--logo-sk-size', v + 'px');
      skLogoVal.textContent = v + 'px';
    }
    skLogoSlider.addEventListener('input', function () { setSkLogo(parseInt(this.value, 10)); });
    setSkLogo(120);

    /* ── MACS logo size ── */
    var macsLogoSlider = document.getElementById('sk-debug-macs-logo-slider');
    var macsLogoVal    = document.getElementById('sk-debug-macs-logo-val');
    var macsImg        = document.getElementById('sk-macs-logo');
    function setMacsLogo(v) {
      root.style.setProperty('--logo-macs-size', v + 'px');
      if (macsImg) macsImg.style.height = v + 'px';
      macsLogoVal.textContent = v + 'px';
    }
    macsLogoSlider.addEventListener('input', function () { setMacsLogo(parseInt(this.value, 10)); });
    setMacsLogo(100);

    /* ── White logo toggle ── */
    var whiteBtn   = document.getElementById('sk-debug-logo-white-btn');
    var whiteMacs  = document.getElementById('sk-macs-logo');
    var logosWhite = false;
    whiteBtn.addEventListener('click', function () {
      logosWhite = !logosWhite;
      document.body.classList.toggle('logos-white', logosWhite);
      if (whiteMacs) whiteMacs.style.filter = logosWhite ? '' : 'none';
      whiteBtn.textContent = logosWhite ? 'ON' : 'OFF';
      whiteBtn.style.background    = logosWhite ? 'rgba(255,255,255,0.18)' : 'transparent';
      whiteBtn.style.color         = logosWhite ? '#fff' : 'rgba(255,255,255,0.6)';
      whiteBtn.style.borderColor   = logosWhite ? 'rgba(255,255,255,0.5)' : 'rgba(255,255,255,0.25)';
    });

  })();
  </script>

  <!-- Social icon micro-animations via GSAP -->
  <script>
  (function () {
    var reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    if (reduced) return;

    /* ── Phone: tips like being answered, elastic settle ── */
    var phoneBtn = document.querySelector('.sk-social-btn--phone');
    if (phoneBtn) {
      var phoneSvg = phoneBtn.querySelector('svg');
      var phoneTl  = gsap.timeline({ paused: true });
      phoneTl
        .to(phoneSvg, { rotation: 18, duration: 0.18, ease: 'power2.out', transformOrigin: '50% 50%' })
        .to(phoneSvg, { rotation: 0,  duration: 0.5,  ease: 'elastic.out(1, 0.5)' });
      phoneBtn.addEventListener('mouseenter', function () { phoneTl.restart(); });
    }

    /* ── Envelope: flap path morphs open then closes ── */
    var mailBtn = document.querySelector('.sk-social-btn--mail');
    if (mailBtn) {
      var flap   = mailBtn.querySelector('.env-flap');
      var mailTl = gsap.timeline({ paused: true });
      mailTl
        .to(flap, { attr: { points: '22,5 12,2 2,5' }, duration: 0.2,  ease: 'power2.out' })
        .to(flap, { attr: { points: '22,6 12,13 2,6' }, duration: 0.38, ease: 'power3.inOut' });
      mailBtn.addEventListener('mouseenter', function () { mailTl.restart(); });
    }

    /* ── Facebook: floats up a few px then drops back with a soft bounce ── */
    var fbBtn = document.querySelector('.sk-social-btn--fb');
    if (fbBtn) {
      var fbSvg = fbBtn.querySelector('svg');
      var fbTl  = gsap.timeline({ paused: true });
      fbTl
        .to(fbSvg, { y: -4, duration: 0.2,  ease: 'power2.out' })
        .to(fbSvg, { y:  0, duration: 0.45, ease: 'elastic.out(1, 0.45)' });
      fbBtn.addEventListener('mouseenter', function () { fbTl.restart(); });
    }
  })();
  </script>
